# ============================================================
# mosquitto_hardened.conf — Version durcie pour tests chemin 1
# ============================================================
# Usage : remplacer mosquitto.conf par ce fichier pour tester
# la sonde MQTT du compliance tool en configuration correcte.
#
# Commande :
#   docker cp mosquitto/mosquitto_hardened.conf \
#              mqtt-broker:/mosquitto/config/mosquitto.conf
#   docker restart mqtt-broker
#
# Exigences IEC 62443 satisfaites par cette configuration :
#   SR 1.1  — Authentification requise (password_file)
#   SR 3.1  — Chiffrement TLS sur port 8883
#   SR 3.3  — ACL par topic (lecture/écriture restreintes)
# ============================================================

# --- Listener TLS (port 8883) ---
listener 8883
protocol mqtt
cafile   /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile  /mosquitto/config/certs/server.key
tls_version tlsv1.3

# --- Listener WebSocket non chiffré désactivé ---
# (commenté volontairement — à ne pas exposer en production)
# listener 9001
# protocol websockets

# --- Authentification ---
allow_anonymous false
password_file /mosquitto/config/passwd

# --- ACL : contrôle d'accès par topic ---
# Format : acl_file définit qui peut lire/écrire quoi
acl_file /mosquitto/config/acl

# --- Logs ---
log_dest stdout
log_type all
log_timestamp true

# --- Persistence ---
persistence true
persistence_location /mosquitto/data/

# ============================================================
# Contenu du fichier acl (à créer séparément) :
#
#   user sensor
#   topic write ics/sensor/#
#   topic write ics/alerts
#
#   user operator
#   topic read ics/sensor/#
#   topic read ics/alerts
#   topic write ics/plc/commands
#
# Génération du fichier passwd :
#   mosquitto_passwd -c /mosquitto/config/passwd sensor
#   mosquitto_passwd /mosquitto/config/passwd operator
# ============================================================
